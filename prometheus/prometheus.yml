global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'wildlife-backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/actuator/prometheus'

  - job_name: 'wildlife-ml-service'
    static_configs:
      - targets: ['ml-service:8000']
    metrics_path: '/metrics'
