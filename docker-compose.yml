version: '3.8'

services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wildlife-postgres
    environment:
      POSTGRES_DB: wildlife_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aikido
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wildlife_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wildlife-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ─── FastAPI ML Service ────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    container_name: wildlife-ml-service
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: models/wildlife_model_resnet50.pt
      SPECIES_MAPPING_PATH: data/species_mapping.json
      MODEL_VERSION: resnet50_v1
      CONFIDENCE_THRESHOLD: "0.5"

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wildlife-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── Auto-Retrain Daemon ───────────────────────────────────────────────────
  retrain:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    container_name: wildlife-retrain
    command: ["python", "retrain.py"]
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ML_SERVICE_URL: http://ml-service:8000
      MLFLOW_TRACKING_URI: http://mlflow:5001
      CONFIDENCE_THRESHOLD: "0.70"
      CHECK_INTERVAL_MINUTES: "60"
      MIN_PREDICTIONS_FOR_CHECK: "10"
    depends_on:
      - prometheus
      - ml-service
      - mlflow
    volumes:
      - ./ml-pipeline/models:/app/models
      - ./ml-pipeline/data:/app/data

  # ─── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    build:
      context: ./mlflow-server
      dockerfile: Dockerfile
    container_name: wildlife-mlflow
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: wildlife-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - backend
      - ml-service

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: wildlife-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:   # persists database across restarts
  uploads:         # persists uploaded images across restarts
  grafana_data:    # persists grafana settings across restarts
  mlflow_data:     # persists mlflow experiments and models across restarts
