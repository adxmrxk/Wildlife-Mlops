version: '3.8'

services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wildlife-postgres
    environment:
      POSTGRES_DB: wildlife_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aikido
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wildlife_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wildlife-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ML_SERVICE_URL: http://ml-service:8000
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_BUCKET: wildlife-uploads
      STORAGE_S3_ACCESS_KEY: minioadmin
      STORAGE_S3_SECRET_KEY: minioadmin123
      STORAGE_S3_REGION: us-east-1
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ─── FastAPI ML Service ────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    container_name: wildlife-ml-service
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: models/wildlife_model_resnet50.pt
      SPECIES_MAPPING_PATH: data/species_mapping.json
      MODEL_VERSION: resnet50_v1
      CONFIDENCE_THRESHOLD: "0.5"

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wildlife-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── Auto-Retrain Daemon ───────────────────────────────────────────────────
  retrain:
    build:
      context: ./ml-pipeline
      dockerfile: Dockerfile
    container_name: wildlife-retrain
    command: ["python", "retrain.py"]
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      ML_SERVICE_URL: http://ml-service:8000
      MLFLOW_TRACKING_URI: http://mlflow:5001
      CONFIDENCE_THRESHOLD: "0.70"
      CHECK_INTERVAL_MINUTES: "60"
      MIN_PREDICTIONS_FOR_CHECK: "10"
    depends_on:
      - prometheus
      - ml-service
      - mlflow
    volumes:
      - ./ml-pipeline/models:/app/models
      - ./ml-pipeline/data:/app/data

  # ─── MinIO (S3-compatible Object Storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wildlife-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO bucket initializer ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: wildlife-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/wildlife-uploads &&
        mc mb --ignore-existing local/wildlife-mlflow &&
        mc anonymous set download local/wildlife-uploads &&
        echo 'Buckets created successfully'
      "

  # ─── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    build:
      context: ./mlflow-server
      dockerfile: Dockerfile
    container_name: wildlife-mlflow
    ports:
      - "5001:5001"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - mlflow_data:/mlflow

  # ─── Redis (in-memory cache) ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wildlife-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: wildlife-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - backend
      - ml-service

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: wildlife-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:   # persists database across restarts
  uploads:         # persists uploaded images across restarts
  grafana_data:    # persists grafana settings across restarts
  mlflow_data:     # persists mlflow experiments and models across restarts
  minio_data:      # persists uploaded images and ML artifacts in S3-compatible storage
  redis_data:      # persists Redis cache across restarts
